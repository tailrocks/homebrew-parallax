name: Pull verified Parallax preview

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parallax-preview-formula
  cancel-in-progress: true

jobs:
  update:
    name: Verify assets and update formula
    runs-on: ubuntu-latest
    permissions:
      contents: write # required only to push the independently verified formula
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Download complete preview asset set
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          metadata=$(gh release view preview --repo tailrocks/parallax \
            --json name,targetCommitish)
          version=$(jq -er '.name | sub("^Preview "; "")' <<< "$metadata")
          source_sha=$(jq -er '.targetCommitish' <<< "$metadata")
          [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::preview target is not a full commit SHA: $source_sha"
            exit 1
          }
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-preview\.[0-9]+\+[0-9a-f]{7}$ ]] || {
            echo "::error::preview version is malformed: $version"
            exit 1
          }
          rm -rf artifacts
          mkdir artifacts
          gh release download preview --repo tailrocks/parallax --dir artifacts
          {
            echo "version=$version"
            echo "source_sha=$source_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Verify checksums, SBOMs, signatures, and provenance
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          targets=(
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-unknown-linux-gnu
            x86_64-unknown-linux-gnu
          )
          test "$(find artifacts -maxdepth 1 -type f | wc -l)" -eq 16
          for target in "${targets[@]}"; do
            archive="artifacts/parallax-${target}.tar.gz"
            for suffix in '' .sha256 .bundle .sbom.json; do
              test -f "${archive}${suffix}" || {
                echo "::error::missing ${archive}${suffix}"
                exit 1
              }
            done
            expected=$(tr -d '\n' < "${archive}.sha256")
            actual=$(sha256sum "$archive" | awk '{print $1}')
            test "$expected" = "$actual" || {
              echo "::error::checksum mismatch for $archive"
              exit 1
            }
            jq -e --arg name "$(basename "$archive")" --arg digest "$actual" '
              .bomFormat == "CycloneDX" and
              .specVersion == "1.6" and
              .metadata.component.name == $name and
              .metadata.component.version == ("sha256:" + $digest)
            ' "${archive}.sbom.json" >/dev/null
            cosign verify-blob \
              --bundle "${archive}.bundle" \
              --certificate-identity \
                "https://github.com/tailrocks/parallax/.github/workflows/preview.yml@refs/heads/main" \
              --certificate-oidc-issuer \
                "https://token.actions.githubusercontent.com" \
              "$archive"
            gh attestation verify "$archive" \
              --repo tailrocks/parallax \
              --signer-workflow tailrocks/parallax/.github/workflows/preview.yml \
              --source-digest "$SOURCE_SHA" \
              --source-ref refs/heads/main \
              --deny-self-hosted-runners >/dev/null
          done

      - name: Verify executable version
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir verified-binary
          tar -xzf artifacts/parallax-x86_64-unknown-linux-gnu.tar.gz \
            -C verified-binary
          test "$(verified-binary/parallax --version)" = "parallax ${VERSION}"

      - name: Rewrite rolling preview formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          arm64_macos=$(cat artifacts/parallax-aarch64-apple-darwin.tar.gz.sha256)
          x86_macos=$(cat artifacts/parallax-x86_64-apple-darwin.tar.gz.sha256)
          arm64_linux=$(cat artifacts/parallax-aarch64-unknown-linux-gnu.tar.gz.sha256)
          x86_linux=$(cat artifacts/parallax-x86_64-unknown-linux-gnu.tar.gz.sha256)
          cat > Formula/parallax-preview.rb <<EOF
          # source-sha: ${SOURCE_SHA}
          class ParallaxPreview < Formula
            desc "Local-first observability for agent-assisted development"
            homepage "https://github.com/tailrocks/parallax"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-aarch64-apple-darwin.tar.gz"
                sha256 "${arm64_macos}"
              end
              on_intel do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-x86_64-apple-darwin.tar.gz"
                sha256 "${x86_macos}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${arm64_linux}"
              end
              on_intel do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${x86_linux}"
              end
            end

            conflicts_with "tailrocks/parallax/parallax", because: "preview and stable install the same binary"

            def install
              bin.install "parallax"
            end

            def caveats
              <<~EOS
                Start the local server (downloads a pinned GreptimeDB on first run):
                  parallax serve
                Then open http://127.0.0.1:4000 - quickstart:
                  https://github.com/tailrocks/parallax/blob/main/docs/guide/quickstart.md
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/parallax --version")
            end
          end
          EOF

      - name: Commit verified formula update
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          git add Formula/parallax-preview.rb
          if git diff --cached --quiet; then
            echo "Preview formula already matches ${SOURCE_SHA}"
            exit 0
          fi
          current_sha=$(gh api \
            "repos/${GITHUB_REPOSITORY}/contents/Formula/parallax-preview.rb" \
            --jq .sha)
          content=$(base64 < Formula/parallax-preview.rb | tr -d '\n')
          gh api --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/Formula/parallax-preview.rb" \
            -f message="parallax@preview ${VERSION}" \
            -f content="$content" \
            -f sha="$current_sha" >/dev/null
